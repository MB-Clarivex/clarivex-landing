window.onerror = (message, source, lineno, colno, errorObj) => {
	const errorDetails = errorObj ? JSON.stringify({
		name: errorObj.name,
		message: errorObj.message,
		stack: errorObj.stack,
		source,
		lineno,
		colno,
	}) : null;

	window.parent.postMessage({
		type: 'horizons-runtime-error',
		message,
		error: errorDetails
	}, '*');
};
</script>

const observer = new MutationObserver((mutations) => {
	for (const mutation of mutations) {
		for (const addedNode of mutation.addedNodes) {
			if (
				addedNode.nodeType === Node.ELEMENT_NODE &&
				(
					addedNode.tagName?.toLowerCase() === 'vite-error-overlay' ||
					addedNode.classList?.contains('backdrop')
				)
			) {
				handleViteOverlay(addedNode);
			}
		}
	}
});

observer.observe(document.documentElement, {
	childList: true,
	subtree: true
});

function handleViteOverlay(node) {
	if (!node.shadowRoot) {
		return;
	}

	const backdrop = node.shadowRoot.querySelector('.backdrop');

	if (backdrop) {
		const overlayHtml = backdrop.outerHTML;
		const parser = new DOMParser();
		const doc = parser.parseFromString(overlayHtml, 'text/html');
		const messageBodyElement = doc.querySelector('.message-body');
		const fileElement = doc.querySelector('.file');
		const messageText = messageBodyElement ? messageBodyElement.textContent.trim() : '';
		const fileText = fileElement ? fileElement.textContent.trim() : '';
		const error = messageText + (fileText ? ' File:' + fileText : '');

		window.parent.postMessage({
			type: 'horizons-vite-error',
			error,
		}, '*');
	}
}
</script>

const originalConsoleError = console.error;
console.error = function(...args) {
	originalConsoleError.apply(console, args);

	let errorString = '';

	for (let i = 0; i < args.length; i++) {
		const arg = args[i];
		if (arg instanceof Error) {
			errorString = arg.stack || `${arg.name}: ${arg.message}`;
			break;
		}
	}

	if (!errorString) {
		errorString = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
	}

	window.parent.postMessage({
		type: 'horizons-console-error',
		error: errorString
	}, '*');
};
</script>

const originalFetch = window.fetch;

window.fetch = function(...args) {
	const url = args[0] instanceof Request ? args[0].url : args[0];

	// Skip WebSocket URLs
	if (url.startsWith('ws:') || url.startsWith('wss:')) {
		return originalFetch.apply(this, args);
	}

	return originalFetch.apply(this, args)
		.then(async response => {
			const contentType = response.headers.get('Content-Type') || '';

			// Exclude HTML document responses
			const isDocumentResponse =
				contentType.includes('text/html') ||
				contentType.includes('application/xhtml+xml');

			if (!response.ok && !isDocumentResponse) {
					const responseClone = response.clone();
					const errorFromRes = await responseClone.text();
					const requestUrl = response.url;
					console.error(`Fetch error from ${requestUrl}: ${errorFromRes}`);
			}

			return response;
		})
		.catch(error => {
			if (!url.match(/.html?$/i)) {
				console.error(error);
			}

			throw error;
		});
};
</script>

 yra dirbtinio intelekto (AI) asistentų platforma, leidžianti automatizuoti kasdienius darbus: kurti ir publikuoti turinį socialiniuose tinkluose, valdyti el. paštą, nustatyti priminimus, generuoti paveikslėlius ir daug daugiau. Platforma palaiko lietuvių kalbą ir balso komandas."}},{"@type":"Question","name":"Ar Clarivex supranta lietuviškai?","acceptedAnswer":{"@type":"Answer","text":"Taip! Clarivex puikiai supranta lietuvių kalbą – tiek rašytinę, tiek balso komandas. Galite bendrauti natūraliai, kaip su tikru asistentu."}},{"@type":"Question","name":"Kokias platformas palaiko Clarivex?","acceptedAnswer":{"@type":"Answer","text":"Šiuo metu palaikome: Instagram (postai, stories, reels), Facebook (puslapiai, grupės), Gmail integraciją, Telegram botą ir WordPress blogus. Nuolat dirbame prie naujų integracijų."}},{"@type":"Question","name":"Ar galiu naudotis Clarivex mobiliajame telefone?","acceptedAnswer":{"@type":"Answer","text":"Taip! Clarivex veikia bet kurioje naršyklėje, taip pat turime Telegram botą, kuris leidžia valdyti platformą tiesiogiai iš Telegram programėlės – idealiai tinka mobiliajam naudojimui."}},{"@type":"Question","name":"Kiek kainuoja Clarivex?","acceptedAnswer":{"@type":"Answer","text":"Clarivex veikia kreditų sistema be mėnesinių mokesčių. Perkate kreditus, kai jų reikia: 1€ = 1000 kreditų. Nauji vartotojai gauna 250 kreditų registracijos metu, o užbaigus profilį — iki 1000 kreditų pradžiai!"}},{"@type":"Question","name":"Ką galiu padaryti su 1000 kreditų?","acceptedAnswer":{"@type":"Answer","text":"Su 1000 kreditų (~1€) galite: parašyti ~100+ AI žinučių su GPT-5 mini (arba ~30 su GPT-5.1), sugeneruoti 12 paveikslėlių (DALL-E 3), transkribuoti ~80 minučių balso, arba atlikti ~50 web paieškų. Naudojant ekonomišką GPT-5 mini modelį, kreditai trunka daug ilgiau!"}},{"@type":"Question","name":"Ar kreditai baigiasi?","acceptedAnswer":{"@type":"Answer","text":"Ne! Nepanaudoti kreditai niekada nesibaigia – jie lieka jūsų paskyroje neribotą laiką. Nėra jokių mėnesinių mokesčių ar prenumeratų."}},{"@type":"Question","name":"Kokius mokėjimo būdus priimate?","acceptedAnswer":{"@type":"Answer","text":"Priimame visas pagrindines mokėjimo korteles (Visa, Mastercard, American Express) per saugią Stripe sistemą. Mokėjimai apdorojami iš karto, kreditai pridedami akimirksniu."}},{"@type":"Question","name":"Ar galiu gauti sąskaitą faktūrą?","acceptedAnswer":{"@type":"Answer","text":"Taip! Po kiekvieno mokėjimo automatiškai išsiunčiame sąskaitą faktūrą el. paštu. Taip pat galite atsisiųsti visas sąskaitas iš savo paskyros nustatymų."}},{"@type":"Question","name":"Ar grąžinate pinigus?","acceptedAnswer":{"@type":"Answer","text":"Kreditai nėra grąžinami, išskyrus atvejus, kai paslauga neveikė dėl mūsų kaltės. Jei susidūrėte su problema, susisiekite su mumis per 14 dienų – visada stengiamės rasti sprendimą."}},{"@type":"Question","name":"Kokie AI modeliai naudojami?","acceptedAnswer":{"@type":"Answer","text":"Naudojame naujausius OpenAI modelius: GPT-5.2, GPT-5.1 ir GPT-5 mini tekstui, DALL-E 3 paveikslėliams, Whisper balso transkripcijai. Galite patys pasirinkti modelį kiekviename pokalbyje!"}},{"@type":"Question","name":"Kurį AI modelį pasirinkti?","acceptedAnswer":{"@type":"Answer","text":"GPT-5 mini (numatytasis) — idealus kasdienėms užduotims: paprasti pokalbiai, el. laiškai, receptai, patarimai, vertimai. Greitas ir ekonomiškas. GPT-5.1 — sudėtingesniems darbams: ilgų dokumentų analizė, detalūs verslo planai, programavimas. GPT-5.2 — maksimali kokybė: mokslinė analizė, sudėtingas loginis mąstymas, kritiškai svarbūs projektai. Patarimas: pradėkite nuo mini — jei rezultatas netenkina, perjunkite į 5.1 ar 5.2."}},{"@type":"Question","name":"Ar AI prisimena mano ankstesnius pokalbius?","acceptedAnswer":{"@type":"Answer","text":"Taip! Clarivex turi ilgalaikę atmintį. Galite pasakyti \"atsimink, kad...\" ir AI prisimins šią informaciją visuose būsimuose pokalbiuose. Taip pat automatiškai mokosi iš jūsų bendravimo stiliaus."}},{"@type":"Question","name":"Ar galiu generuoti paveikslėlius?","acceptedAnswer":{"@type":"Answer","text":"Taip! Naudojame DALL-E 3 modelį, kuris generuoja aukštos kokybės paveikslėlius iki 1792x1024 pikselių. Tiesiog aprašykite, ko norite, ir AI sukurs unikalų paveikslėlį."}},{"@type":"Question","name":"Kaip veikia balso komandos?","acceptedAnswer":{"@type":"Answer","text":"Tiesiog paspauskite mikrofono mygtuką ir kalbėkite lietuviškai. AI automatiškai transkribuos jūsų balsą ir atliks užklausą. Veikia ir per Telegram botą!"}},{"@type":"Question","name":"Ar AI gali analizuoti mano dokumentus?","acceptedAnswer":{"@type":"Answer","text":"Taip! Galite įkelti PDF, Word, Excel ir kitus failus. AI juos išanalizuos ir galės atsakyti į klausimus apie dokumento turinį, apibendrinti informaciją ar išgauti konkrečius duomenis."}},{"@type":"Question","name":"Kaip prijungti Instagram/Facebook paskyrą?","acceptedAnswer":{"@type":"Answer","text":"Eikite į Socialinių tinklų skyrių → Paskyros → Prijungti naują. Būsite nukreipti į Meta (Facebook) prisijungimą, kur suteiksite leidimus. Svarbu: Instagram turi būti Business arba Creator tipo paskyra, susieta su Facebook puslapiu."}},{"@type":"Question","name":"Ar galiu planuoti postus į ateitį?","acceptedAnswer":{"@type":"Answer","text":"Taip! Galite suplanuoti postus bet kuriam laikui į ateitį. Naudokite kalendoriaus vaizdą, kad matytumėte visus suplanuotus postus, arba nustatykite pasikartojančius laiko tarpus automatiniam publikavimui."}},{"@type":"Question","name":"Ar palaikote Instagram Stories ir Reels?","acceptedAnswer":{"@type":"Answer","text":"Stories publikavimas šiuo metu nepalaikomas dėl Instagram API apribojimų. Reels palaikomi – galite įkelti video ir publikuoti kaip Reel."}},{"@type":"Question","name":"Kiek nuotraukų galiu įkelti į vieną postą?","acceptedAnswer":{"@type":"Answer","text":"Galite įkelti iki 10 nuotraukų/video į vieną postą (carousel). Tai Instagram limitas, kurį palaikome pilnai."}},{"@type":"Question","name":"Kodėl mano postas nepublikavosi?","acceptedAnswer":{"@type":"Answer","text":"Dažniausios priežastys: 1) Pasibaigė prieigos rakto galiojimas – perjunkite paskyrą iš naujo; 2) Instagram API klaida – bandykite dar kartą; 3) Turinys pažeidžia platformos taisykles. Patikrinkite klaidos pranešimą kalendoriuje."}},{"@type":"Question","name":"Ar mano duomenys saugūs?","acceptedAnswer":{"@type":"Answer","text":"Taip! Naudojame šiuolaikinius saugumo standartus: SSL/TLS šifravimą, duomenų šifravimą ramybės būsenoje, reguliarias saugumo peržiūras. Jūsų duomenys saugomi ES serveriuose pagal BDAR reikalavimus."}},{"@type":"Question","name":"Ar Clarivex mato mano slaptažodžius?","acceptedAnswer":{"@type":"Answer","text":"Ne. Socialinių tinklų ir el. pašto prisijungimai vyksta tiesiogiai per oficialias platformų sistemas (OAuth). Mes nematome ir nesaugome jūsų slaptažodžių."}},{"@type":"Question","name":"Ar galiu ištrinti savo duomenis?","acceptedAnswer":{"@type":"Answer","text":"Taip! Pagal BDAR turite teisę būti pamirštas. Galite pateikti prašymą per mūsų duomenų ištrynimo puslapį arba parašyti el. laišką info@clarivex.ai. Duomenys bus ištrinti per 30 dienų."}},{"@type":"Question","name":"Ar mano pokalbiai su AI naudojami AI mokymui?","acceptedAnswer":{"@type":"Answer","text":"Mes nenaudojame jūsų duomenų AI modelių mokymui. Jūsų pokalbiai naudojami tik paslaugos teikimui ir jūsų asmeninei AI atminčiai."}},{"@type":"Question","name":"Kaip susisiekti su pagalba?","acceptedAnswer":{"@type":"Answer","text":"Parašykite per Telegram @clarivex_support_bot – greičiausias būdas, atsakome per 1–2 valandas. Arba el. paštu info@clarivex.ai."}},{"@type":"Question","name":"Ar turite vaizdo instrukcijas?","acceptedAnswer":{"@type":"Answer","text":"Dirbame prie vaizdo pamokų! Tuo tarpu rasite tekstines instrukcijas šiame DUK skyriuje ir pagalbos straipsniuose platformoje."}},{"@type":"Question","name":"Radau klaidą, kur pranešti?","acceptedAnswer":{"@type":"Answer","text":"Ačiū, kad padedame tobulėti! Parašykite per Telegram @clarivex_support_bot su kuo detalesniu aprašymu – ką darėte, kas nutiko, kokį klaidos pranešimą matėte. Arba el. paštu info@clarivex.ai."}}]}</script></head>
